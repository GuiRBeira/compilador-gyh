name: Compiler CI - Linguagem GYH

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
    
    - name: ☕ Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'
    
    - name: 🔨 Compile compiler
      run: |
        mkdir -p build
        javac -d build src/main/java/gyh/*.java
    
    - name: 📥 Download JUnit
      run: |
        mkdir -p lib
        wget -q -O lib/junit-platform-console-standalone.jar \
          https://repo1.maven.org/maven2/org/junit/platform/junit-platform-console-standalone/1.10.0/junit-platform-console-standalone-1.10.0.jar || true
    
    - name: 🧪 Run tests
      run: |
        if [ -f src/test/java/gyh/LexicalAnalyzerTest.java ]; then
          javac -cp "build:lib/junit-platform-console-standalone.jar" -d build src/test/java/gyh/*.java
          java -jar lib/junit-platform-console-standalone.jar --class-path build --scan-class-path --include-classname '.*Test'
        else
          echo "No tests found yet"
        fi
    
    - name: 📝 Test example programs
      run: |
        echo "Testing example programs..."
        for file in tests/programs/*.gyh; do
          if [ -f "$file" ]; then
            echo "  Testing $(basename $file)..."
            java -cp build LexicalAnalyzer "$file"
          fi
        done